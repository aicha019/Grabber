<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des ordinateurs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 { color: #333; }
        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #4CAF50; color: white; }
        tr:hover { background-color: #f5f5f5; }
        .btn {
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            color: white;
        }
        .btn-view { background-color: #2196F3; }
        .btn-delete { background-color: #f44336; }
    </style>
</head>
<body>
    <h1>Liste des ordinateurs</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Hostname</th>
                <th>OS</th>
                <th>IP</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for ordi in ordis %}
            <tr>
                <td>{{ ordi.id }}</td>
                <td>{{ ordi.hostname }}</td>
                <td>{{ ordi.os }}</td>
                <td>{{ ordi.ipv4 }}</td>
                <td>
                    <a href="/ordi/{{ ordi.id }}" class="btn btn-view">Voir</a>
                    <a href="/ordi/{{ ordi.id }}/delete" class="btn btn-delete">Supprimer</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
