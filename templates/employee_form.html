<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un employé</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        form {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <h1>Créer un employé</h1>

    {% if success %}
    <div class="success-message">
        ✅ Employé créé avec succès !
    </div>
    {% endif %}

    <form action="/employee/create" method="post">
        <label for="first_name">Prénom</label>
        <input type="text" id="first_name" name="first_name" placeholder="Prénom" required>

        <label for="family_name">Nom de famille</label>
        <input type="text" id="family_name" name="family_name" placeholder="Nom de famille" required>
        <label for="badge_number">Numéro de badge</label>
        <input type="text" id="badge_number" name="badge_number" placeholder="Numéro de badge" required>
        <label for="ordi_ids">Ordinateurs associés</label>
<select id="ordi_ids" name="ordi_ids" multiple style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:4px;">
    {% for ordi in ordis %}
    <option value="{{ ordi.id }}">{{ ordi.hostname }} ({{ ordi.mac_adress }})</option>
    {% endfor %}
</select>
<small style="color:#888;">Maintenez Ctrl (ou Cmd sur Mac) pour sélectionner plusieurs ordis</small>
        <button type="submit">Créer l'employé</button>
    </form>

</body>
</html>
