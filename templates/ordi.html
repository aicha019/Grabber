<html>
<head>
    <title>Informations machine</title>
    <style>

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8; /* fond gris clair */
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }


        .table-container {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: collapse;
            width: 420px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
        }

        th {
            background-color: #2c3e50;
            color: white;
            text-align: left;
            width: 45%;
        }

        td {
            text-align: right;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="table-container">
    <table>
        <tr>
            <th>Information</th>
            <th>Valeur</th>
        </tr>

        {% for key, value in ordi.__dict__.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
